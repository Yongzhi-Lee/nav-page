<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属导航</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-image"></div>
    
    <div class="container">
        <header>
            <h1 id="clock">00:00</h1>
            <p id="date">YYYY年MM月DD日</p>
        </header>

        <div class="search-box">
            <form action="https://www.google.com/search" method="GET" target="_blank">
                <input type="text" name="q" placeholder="输入关键字搜索..." autocomplete="off" autofocus>
                <button type="submit">🔍</button>
            </form>
        </div>

        <main class="bookmarks">
            <div class="category">
                <h2>💻 常用工具</h2>
                <div class="links">
                    <a href="https://github.com" target="_blank">GitHub</a>
                    <a href="https://chatgpt.com" target="_blank">ChatGPT</a>
                    <a href="https://translate.google.com" target="_blank">Google 翻译</a>
                </div>
            </div>
            
            <div class="category">
                <h2>🍿 影音娱乐</h2>
                <div class="links">
                    <a href="https://bilibili.com" target="_blank">哔哩哔哩</a>
                    <a href="https://youtube.com" target="_blank">YouTube</a>
                    <a href="https://music.163.com/" target="_blank">网易云音乐</a>
                </div>
            </div>

            <div class="category">
                <h2>📚 学习阅读</h2>
                <div class="links">
                    <a href="https://juejin.cn/" target="_blank">稀土掘金</a>
                    <a href="https://stackoverflow.com/" target="_blank">Stack Overflow</a>
                    <a href="https://v2ex.com/" target="_blank">V2EX</a>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
